# GitLab CI/CD Pipeline Configuration
# Builds and pushes Docker image to GitLab Container Registry

stages:
  - build

variables:
  REGISTRY: $CI_REGISTRY
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

# Build and push Docker image for amd64
build_docker_amd64:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building Docker image for amd64 ${IMAGE_NAME}:${IMAGE_TAG}-amd64"
    - docker build --platform linux/amd64 -t ${IMAGE_NAME}:${IMAGE_TAG}-amd64 .
    - docker tag ${IMAGE_NAME}:${IMAGE_TAG}-amd64 ${IMAGE_NAME}:latest-amd64
    - echo "Pushing image to registry..."
    - docker push ${IMAGE_NAME}:${IMAGE_TAG}-amd64
    - docker push ${IMAGE_NAME}:latest-amd64
    - echo "Docker image pushed successfully"
  only:
    - main
  tags:
    - local2
