# Global configuration - applies to all endpoints
# allowed_events: Define which event types to handle (optional)
# If not specified or empty, all event types will be handled
# Event types follow the pattern: <source>.<event_kind>
# Examples:
#   - github.push
#   - github.pull_request
#   - github.issues
#   - github.issue_comment
#   - github.workflow_run
#   - gitlab.push
#   - gitlab.merge_request
#   - gitlab.pipeline
#   - gitlab.build
allowed_events:
  - github.push
  - github.pull_request
  - gitlab.push
  - gitlab.merge_request
  - gitlab.pipeline

configs:
  # Example with Lark only
  - source_type: gitlab
    endpoint: /gitlab-foobar
    lark_webhook_url: https://open.larksuite.com/open-apis/bot/v2/hook/KEY

  # Example with Telegram only
  - source_type: github
    endpoint: /github-myrepo
    telegram_bot_token: YOUR_BOT_TOKEN
    telegram_chat_id: "-1001234567890"

  # Example with Telegram topic/thread (for supergroups with topics enabled)
  - source_type: grafana
    endpoint: /grafana
    telegram_bot_token: YOUR_BOT_TOKEN
    telegram_chat_id: "-1001234567890"
    telegram_chat_sub_id: "123"
    lark_message_title: Grafana

  # Example with both Lark and Telegram
  - source_type: generic
    endpoint: /redpanda-overview
    lark_webhook_url: https://open.larksuite.com/open-apis/bot/v2/hook/KEY
    lark_message_title: Redpanda Health Overview
    telegram_bot_token: YOUR_BOT_TOKEN
    telegram_chat_id: "-1001234567890"

  # GitLab with custom branch and status filters
  # This example monitors only main and develop branches, and notifies on failed and success statuses
  - source_type: gitlab
    endpoint: /gitlab-custom-filters
    lark_webhook_url: https://open.larksuite.com/open-apis/bot/v2/hook/KEY
    gitlab_branches: # Optional: empty or omit to monitor all branches
      - main
      - develop
    gitlab_statuses: # Optional: empty = failed only, or specify: failed, success, running, pending, canceled, skipped
      - failed
      - success

  # GitLab with all notifications enabled
  # This example notifies on ALL pipeline/build events regardless of status or branch
  - source_type: gitlab
    endpoint: /gitlab-notify-all
    telegram_bot_token: YOUR_BOT_TOKEN
    telegram_chat_id: "-1001234567890"
    gitlab_notify_all: true # Enable this to get notified on all statuses
    gitlab_branches: # Can still filter by branches even with notify_all
      - main
